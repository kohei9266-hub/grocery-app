<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>買い出しメモ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --green:#2D6A4F;--green-l:#52B788;--green-p:#D8F3DC;
  --text:#1B2A22;--muted:#7A8E82;--bg:#F5F7F5;--card:#fff;
  --border:#E3EDE6;--orange:#F4845F;--red:#E63946;--nav:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;min-height:100vh;}
.screen{display:none;flex-direction:column;height:calc(100vh - var(--nav));overflow:hidden;}
.screen.active{display:flex;}
.scroll-area{flex:1;overflow-y:auto;padding:12px 12px 20px;}
/* ── HEADER ── */
#app-header{background:var(--card);padding:12px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.header-row{display:flex;justify-content:space-between;align-items:center;}
.app-title{font-size:17px;font-weight:700;display:flex;align-items:center;gap:6px;color:var(--text);}
.app-title .icon{font-size:18px;}
.header-date{font-size:11px;color:var(--muted);font-weight:500;}
/* ── STORE TABS ── */
#store-tabs-wrap{background:var(--card);padding:8px 12px;display:flex;align-items:center;gap:6px;overflow-x:auto;border-bottom:1px solid var(--border);flex-shrink:0;}
#store-tabs-wrap::-webkit-scrollbar{display:none;}
.store-tab{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;color:var(--muted);white-space:nowrap;transition:all .15s;flex-shrink:0;}
.store-tab.active{background:var(--text);color:#fff;border-color:var(--text);}
.store-tab .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
#more-tab{padding:6px 10px;border-radius:20px;border:1.5px solid var(--border);background:none;cursor:pointer;font-size:14px;color:var(--muted);flex-shrink:0;}
#add-store-btn{padding:6px 10px;border-radius:20px;border:1.5px dashed var(--green-l);background:none;cursor:pointer;font-size:14px;color:var(--green);flex-shrink:0;}
/* ── BUDGET BAR ── */
#budget-bar{background:var(--card);padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.budget-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.budget-label{font-size:12px;color:var(--muted);}
.budget-amounts{display:flex;align-items:baseline;gap:4px;}
.budget-cur{font-size:20px;font-weight:700;color:var(--green);}
.budget-max{font-size:12px;color:var(--muted);}
.budget-store-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.bs-chip{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);}
.bs-chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.progress-bar{height:7px;background:var(--border);border-radius:4px;overflow:hidden;display:flex;}
.progress-seg{height:100%;transition:width .3s;}
/* ── STORE BLOCK ── */
.store-block{margin-bottom:14px;}
.store-block-header{display:flex;align-items:center;gap:8px;padding:10px 0 6px;}
.store-name-badge{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;}
.store-name-badge .dot{width:10px;height:10px;border-radius:50%;}
.store-divider{flex:1;border:none;border-top:1.5px dashed var(--border);}
.store-subtotal{font-size:12px;color:var(--muted);white-space:nowrap;}
/* ── CATEGORY ── */
.cat-section{margin-bottom:4px;}
.cat-header{display:flex;align-items:center;gap:6px;padding:8px 0 4px;}
.cat-icon{font-size:18px;}
.cat-name{font-size:13px;font-weight:700;color:var(--text);}
.cat-count{margin-left:auto;font-size:11px;color:var(--muted);}
/* ── ITEM CARD ── */
.item-card{background:var(--card);border-radius:10px;margin-bottom:6px;border:1px solid var(--border);border-left:3px solid var(--green);overflow:hidden;transition:opacity .2s;}
.item-card.checked{opacity:.4;border-left-color:var(--muted);}
.item-main{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;}
.item-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;cursor:pointer;transition:all .2s;}
.item-check.done{background:var(--green);border-color:var(--green);}
.item-check.done::after{content:'✓';color:#fff;font-size:12px;font-weight:700;}
.item-body{flex:1;min-width:0;}
.item-name{font-size:15px;font-weight:600;margin-bottom:3px;}
.item-sub{font-size:12px;color:var(--muted);margin-bottom:4px;}
.item-badges{display:flex;flex-wrap:wrap;gap:4px;}
.badge{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:500;}
.badge-orange{background:#FFF0E6;color:var(--orange);border:1px solid #FFD4B8;}
.badge-green{background:var(--green-p);color:var(--green);}
.badge-gray{background:#F2F2F2;color:#666;}
.badge-best{background:#FFF9E6;color:#D4820A;border:1px solid #FFE8A0;}
.item-price-col{text-align:right;flex-shrink:0;}
.item-price{font-size:16px;font-weight:700;color:var(--text);}
.item-price-label{font-size:10px;color:var(--muted);margin-top:1px;}
.qty-ctrl{display:flex;align-items:center;gap:6px;margin-top:4px;}
.qty-btn{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--green-l);background:none;color:var(--green);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-num{font-size:13px;font-weight:700;min-width:20px;text-align:center;}
/* ── ADD BUTTON ── */
.add-item-row{display:flex;align-items:center;gap:8px;padding:6px 0 4px;cursor:pointer;color:var(--green);font-size:13px;font-weight:500;}
.add-circle{width:26px;height:26px;border-radius:50%;border:1.5px dashed var(--green-l);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--green-l);flex-shrink:0;}
/* ── CHECKED SECTION ── */
.checked-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 0 4px;font-size:12px;color:var(--muted);}
.clear-btn{font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;}
/* ── BOTTOM NAV ── */
#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:var(--nav);background:var(--card);border-top:1px solid var(--border);display:flex;z-index:200;box-shadow:0 -2px 10px rgba(0,0,0,.06);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:10px;font-family:inherit;transition:color .2s;}
.nav-btn.active{color:var(--green);}
.nav-btn svg{width:22px;height:22px;}
/* ── SUB NAV ── */
.sub-nav{display:flex;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
.sub-btn{flex:1;padding:12px 4px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;}
.sub-btn.active{color:var(--green);border-bottom-color:var(--green);}
/* ── CARDS / FORMS ── */
.section-card{background:var(--card);border-radius:12px;margin-bottom:12px;border:1px solid var(--border);overflow:hidden;}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);}
.card-header h3{font-size:15px;font-weight:700;}
.row-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-top:1px solid var(--border);}
.row-item:first-child{border-top:none;}
.toggle{width:40px;height:22px;background:#ccc;border-radius:11px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--green);}
.toggle::after{content:'';width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s;}
.toggle.on::after{left:20px;}
.stepper{display:flex;align-items:center;gap:8px;}
.step-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--green);background:none;cursor:pointer;color:var(--green);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.step-val{min-width:36px;text-align:center;font-weight:700;}
.form-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;outline:none;transition:border .2s;}
.form-input:focus{border-color:var(--green);}
.form-group{margin-bottom:14px;}
.input-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px;display:block;}
.btn-primary{background:var(--green);color:#fff;border:none;border-radius:10px;padding:12px 18px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;width:100%;}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px;}
.btn-outline{background:none;border:1.5px solid var(--green);color:var(--green);border-radius:10px;padding:9px 14px;font-family:inherit;font-size:13px;cursor:pointer;}
.btn-danger{background:var(--red);}
.btn-icon{background:none;border:none;cursor:pointer;padding:5px;color:var(--muted);font-size:17px;}
.alert-banner{background:#FFF0F0;border:1.5px solid var(--red);border-radius:10px;padding:11px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-state .icon{font-size:44px;margin-bottom:8px;}
/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:22px 20px 40px;max-height:88vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.modal-close{float:right;font-size:22px;background:none;border:none;cursor:pointer;color:var(--muted);}
.emoji-picker{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.emoji-opt{width:36px;height:36px;font-size:20px;border-radius:8px;border:1.5px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.emoji-opt.selected{border-color:var(--green);background:var(--green-p);}
.color-swatches{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.color-swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;}
.color-swatch.selected{border-color:var(--text);}
.suggest-item{padding:9px 12px;background:#F5FBF7;border-radius:8px;margin-bottom:4px;cursor:pointer;font-size:14px;border:1px solid var(--green-p);}
/* ── CHART ── */
.chart-card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid var(--border);}
.chart-card h3{font-size:14px;font-weight:700;margin-bottom:12px;}
/* ── HISTORY ── */
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-top:1px solid var(--border);font-size:13px;}
.hist-row.best{background:#FFFDE7;}
.hist-price{font-weight:700;color:var(--green);}
</style>
</head>
<body>

<!-- ══════════════════════════════
     SCREEN 1: 買い出し
══════════════════════════════ -->
<div id="screen-shopping" class="screen active">
  <!-- Header -->
  <div id="app-header">
    <div class="header-row">
      <div class="app-title"><span class="icon">🛒</span>買い出しメモ</div>
      <div class="header-date" id="header-date"></div>
    </div>
  </div>
  <!-- Store Tabs -->
  <div id="store-tabs-wrap">
    <button class="store-tab active" data-store="all">全店舗</button>
    <button id="add-store-btn">＋</button>
  </div>
  <!-- Budget Bar -->
  <div id="budget-bar">
    <div class="budget-header">
      <span class="budget-label">合計予算</span>
      <div class="budget-amounts">
        <span class="budget-cur" id="total-cur">¥0</span>
        <span class="budget-max" id="total-max"></span>
      </div>
    </div>
    <div class="budget-store-row" id="bs-chips"></div>
    <div class="progress-bar" id="budget-progress"></div>
  </div>
  <!-- List -->
  <div class="scroll-area" id="shopping-content"></div>
</div>

<!-- ══════════════════════════════
     SCREEN 2: 商品管理
══════════════════════════════ -->
<div id="screen-manage" class="screen">
  <div class="sub-nav">
    <button class="sub-btn active" onclick="switchManageTab('categories')">カテゴリ</button>
    <button class="sub-btn" onclick="switchManageTab('inventory')">在庫管理</button>
    <button class="sub-btn" onclick="switchManageTab('stores')">店舗</button>
  </div>
  <div class="scroll-area" id="manage-categories"></div>
  <div class="scroll-area" id="manage-inventory" style="display:none"></div>
  <div class="scroll-area" id="manage-stores" style="display:none"></div>
</div>

<!-- ══════════════════════════════
     SCREEN 3: 価格履歴
══════════════════════════════ -->
<div id="screen-prices" class="screen">
  <div style="padding:12px 12px 0;flex-shrink:0;">
    <input class="form-input" id="price-search-input" placeholder="🔍 商品名で検索..." oninput="renderPricesTab(this.value)" style="width:100%">
  </div>
  <div class="scroll-area" id="prices-content" style="padding-top:8px"></div>
</div>

<!-- ══════════════════════════════
     SCREEN 4: 店舗設定
══════════════════════════════ -->
<div id="screen-stores" class="screen">
  <div class="scroll-area" id="stores-content"></div>
</div>

<!-- ══ BOTTOM NAV ══ -->
<nav id="bottom-nav">
  <button class="nav-btn active" onclick="switchScreen('shopping')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    買い出し
  </button>
  <button class="nav-btn" onclick="switchScreen('manage')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="m9 12 2 2 4-4"/></svg>
    商品管理
  </button>
  <button class="nav-btn" onclick="switchScreen('prices')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    価格履歴
  </button>
  <button class="nav-btn" onclick="switchScreen('stores')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    店舗
  </button>
</nav>

<!-- ══ MODALS ══ -->
<!-- Item add modal -->
<div class="modal-overlay" id="item-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('item-modal')">✕</button>
    <div class="modal-title">商品を追加</div>
    <input type="hidden" id="item-store-id">
    <input type="hidden" id="item-cat-id">
    <div class="form-group">
      <label class="input-label">商品名</label>
      <input class="form-input" id="item-name" placeholder="例：キャベツ" oninput="suggestItems(this.value)">
      <div id="item-suggest"></div>
    </div>
    <div class="form-group">
      <label class="input-label">1つの量・サイズ（例：100g、300g入り1袋、1個）</label>
      <input class="form-input" id="item-unit" placeholder="100g・1袋・1個..." oninput="onUnitInput()">
    </div>
    <!-- weight mode: shown when unit is pure "Xg" e.g. "100g" -->
    <div class="form-group" id="weight-mode-row" style="display:none;background:#F0FAF4;border-radius:10px;padding:10px 12px;border:1px solid var(--green-p);">
      <label class="input-label" style="color:var(--green);font-weight:700;">📦 実際の重さ（パックに書いてあるg数）</label>
      <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
        <input class="form-input" id="item-actual-g" type="number" placeholder="例：708" min="1" step="1" style="width:110px;" oninput="updateTotalPreview()">
        <span style="color:var(--muted);font-size:14px;font-weight:500;">g</span>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:4px;">単価×実際の重さで金額を自動計算します</div>
    </div>
    <!-- count mode: shown for non-weight items -->
    <div class="form-group" id="count-mode-row">
      <label class="input-label">個数（何個・何袋買うか）</label>
      <div style="display:flex;align-items:center;gap:12px;">
        <button type="button" onclick="stepQty(-1)" style="width:36px;height:36px;border-radius:50%;border:1.5px solid var(--green);background:none;color:var(--green);font-size:20px;cursor:pointer;">−</button>
        <input class="form-input" id="item-qty" type="number" value="1" min="1" step="1" style="width:70px;text-align:center;font-weight:700;font-size:16px;">
        <button type="button" onclick="stepQty(1)" style="width:36px;height:36px;border-radius:50%;border:1.5px solid var(--green);background:none;color:var(--green);font-size:20px;cursor:pointer;">＋</button>
      </div>
    </div>
    <div class="form-group">
      <label class="input-label">チラシ価格（1つあたり・任意）</label>
      <input class="form-input" id="item-flyer" type="number" placeholder="¥" oninput="updateTotalPreview()">
      <span id="item-total-preview" style="font-size:13px;color:var(--green);font-weight:700;margin-top:5px;display:block;min-height:18px;"></span>
    </div>
    <button class="btn-primary" onclick="saveShoppingItem()">リストに追加</button>
  </div>
</div>

<!-- Item action modal -->
<div class="modal-overlay" id="action-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('action-modal')">✕</button>
    <div class="modal-title" id="action-title">商品の操作</div>
    <input type="hidden" id="action-id">
    <div class="form-group">
      <label class="input-label">チラシ価格メモ</label>
      <input class="form-input" id="action-flyer" type="number" placeholder="¥">
    </div>
    <div class="form-group">
      <label class="input-label">実際の購入価格</label>
      <input class="form-input" id="action-actual" type="number" placeholder="¥">
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn-primary" style="flex:1" onclick="saveAction()">保存</button>
      <button class="btn-primary btn-danger" style="flex:0;white-space:nowrap;width:auto" onclick="deleteItem()">削除</button>
    </div>
  </div>
</div>

<!-- Store modal -->
<div class="modal-overlay" id="store-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('store-modal')">✕</button>
    <div class="modal-title" id="store-modal-title">店舗を追加</div>
    <input type="hidden" id="store-edit-id">
    <div class="form-group">
      <label class="input-label">店舗名</label>
      <input class="form-input" id="store-name" placeholder="例：東急ストア 藤が丘店">
    </div>
    <div class="form-group">
      <label class="input-label">カラー</label>
      <div class="color-swatches" id="color-swatches"></div>
    </div>
    <div class="form-group">
      <label class="input-label">月予算（円）</label>
      <input class="form-input" id="store-budget" type="number" placeholder="0">
    </div>
    <button class="btn-primary" onclick="saveStore()">保存</button>
  </div>
</div>

<!-- Category modal -->
<div class="modal-overlay" id="cat-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('cat-modal')">✕</button>
    <div class="modal-title" id="cat-modal-title">カテゴリを追加</div>
    <input type="hidden" id="cat-edit-id">
    <div class="form-group">
      <label class="input-label">カテゴリ名</label>
      <input class="form-input" id="cat-name" placeholder="例：野菜">
    </div>
    <div class="form-group">
      <label class="input-label">絵文字アイコン</label>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>
    <div class="form-group">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="toggle" id="cat-stock-toggle" onclick="this.classList.toggle('on')"></div>
        <span style="font-size:13px">在庫管理をON</span>
      </div>
    </div>
    <button class="btn-primary" onclick="saveCategory()">保存</button>
  </div>
</div>

// ═══════════════════════════════════════
// FETCH-BASED SUPABASE CLIENT
// ═══════════════════════════════════════
function createFetchClient(url, key) {
  const H = {
    'apikey': key,
    'Authorization': 'Bearer ' + key,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };
  async function req(method, path, body) {
    try {
      const r = await fetch(url + path, {
        method,
        headers: H,
        body: body != null ? JSON.stringify(body) : undefined
      });
      if (r.status === 204) return {data: null, error: null};
      const d = await r.json();
      return r.ok ? {data: d, error: null} : {data: null, error: d};
    } catch(e) {
      return {data: null, error: {message: e.message}};
    }
  }
  function from(tbl) {
    const state = {filters: [], orderStr: '', selCols: '*'};
    const q = {
      select(s) { state.selCols = s || '*'; return q; },
      eq(c, v) { state.filters.push(c + '=eq.' + encodeURIComponent(v)); return q; },
      in(c, vs) { state.filters.push(c + '=in.(' + vs.join(',') + ')'); return q; },
      order(c, o) { state.orderStr = 'order=' + c + '.' + ((o && o.ascending === false) ? 'desc' : 'asc'); return q; },
      then(fn) {
        let path = '/rest/v1/' + tbl + '?select=' + state.selCols;
        state.filters.forEach(function(f) { path += '&' + f; });
        if (state.orderStr) path += '&' + state.orderStr;
        return req('GET', path).then(fn);
      },
      insert(d) {
        const arr = Array.isArray(d) ? d : [d];
        return {
          select() {
            return {
              single() {
                return req('POST', '/rest/v1/' + tbl, arr[0]).then(function(r) {
                  return {data: Array.isArray(r.data) ? r.data[0] : r.data, error: r.error};
                });
              },
              then(fn) { return req('POST', '/rest/v1/' + tbl, arr).then(fn); }
            };
          },
          then(fn) { return req('POST', '/rest/v1/' + tbl, arr).then(fn); }
        };
      },
      update(d) {
        return {
          eq(c, v) { return req('PATCH', '/rest/v1/' + tbl + '?' + c + '=eq.' + encodeURIComponent(v), d); }
        };
      },
      delete() {
        return {
          eq(c, v) { return req('DELETE', '/rest/v1/' + tbl + '?' + c + '=eq.' + encodeURIComponent(v)); },
          in(c, vs) { return req('DELETE', '/rest/v1/' + tbl + '?' + c + '=in.(' + vs.join(',') + ')'); }
        };
      }
    };
    return q;
  }
  return {from: from};
}

function loadDemo() {

  S.stores = PRESET_STORES.map(function(s,i){return Object.assign({},s,{id:'s'+i});});
  S.items = []; S.shoppingList = []; S.priceHistory = []; S.budgets = [];
}

async function loadData() {
  try {
    const catsRes = await db.from('categories').select('*').order('sort_order');
    if (catsRes.error) throw new Error(JSON.stringify(catsRes.error));
    if (!catsRes.data || catsRes.data.length === 0) {
      await seedPresets();
    } else {
      S.categories = catsRes.data;
      const storesRes = await db.from('stores').select('*').order('name');
      S.stores = storesRes.data || [];
    }
    const [itemsR, listR, histR, budR] = await Promise.all([
      db.from('items').select('*').order('name'),
      db.from('shopping_list').select('*').eq('date', today()).order('created_at'),
      db.from('price_history').select('*').order('date',{ascending:false}),
      db.from('budget').select('*').eq('month', thisMonth())
    ]);
    S.items = itemsR.data || [];
    S.shoppingList = listR.data || [];
    S.priceHistory = histR.data || [];
    S.budgets = budR.data || [];
  } catch(e) {
    console.error('load error', e);
    loadDemo();
  }
}

async function seedPresets() {
  if (!db) return;
  const cr = await db.from('categories').insert(PRESET_CATS).select().then(function(r){return r;});
  const sr = await db.from('stores').insert(PRESET_STORES).select().then(function(r){return r;});

  S.stores = (sr && sr.data) || PRESET_STORES.map(function(s,i){return Object.assign({},s,{id:'s'+i});});
}

  var totalBudget = S.budgets.reduce(function(s,b){return s+b.amount;},0);

  S.shoppingList.filter(function(item){return !item.is_checked;}).forEach(function(item) {

  var filtered = S.currentStore === 'all'

    : S.shoppingList.filter(function(i){return i.store_id===S.currentStore;});

  var checked = filtered.filter(function(i){return i.is_checked;});

    // Group by store

    unchecked.forEach(function(item) {
      var sid = item.store_id || 'none';
      if (!storeGroups[sid]) storeGroups[sid] = [];
      storeGroups[sid].push(item);
    });

      if (!storeGroups[s.id]) storeGroups[s.id] = [];
    });

      html += '<div class="store-divider"></div>';

      html += '</div>';
      html += renderCatGroups(items, storeId);
      html += '</div>';
    });
  } else {
    html += '<div class="store-block">';
    html += renderCatGroups(unchecked, S.currentStore);
    html += '</div>';

    html += '<div class="checked-bar">購入済み（'+checked.length+'）<button class="clear-btn" onclick="clearChecked()">リストから削除</button></div>';
    checked.forEach(function(item) { html += renderItemCard(item); });
  }
  if (unchecked.length === 0 && checked.length === 0) {
    html += '<div class="empty-state"><div class="icon">🛒</div><p>買い出しリストが空です<br>カテゴリの下の＋ボタンで追加</p></div>';
  }
  el.innerHTML = html;
}

function renderCatGroups(items, storeId) {
  var html = '';
  var catMap = {};
  items.forEach(function(item) {
    var cid = item.category_id || 'none';
    if (!catMap[cid]) catMap[cid] = [];
    catMap[cid].push(item);
  });
  var cats = S.categories.slice().sort(function(a,b){return (a.sort_order||0)-(b.sort_order||0);});
  cats.forEach(function(cat) {
    var catItems = catMap[cat.id] || [];
    var count = catItems.length;
    html += '<div class="cat-section">';
    html += '<div class="cat-header"><span class="cat-icon">'+cat.icon+'</span><span class="cat-name">'+cat.name+'</span>';
    if (count) html += '<span class="cat-count">'+count+'品</span>';
    html += '</div>';
    catItems.forEach(function(item) { html += renderItemCard(item); });
    html += '<div class="add-item-row" onclick="openAddItem(\''+storeId+'\',\''+cat.id+'\')">';
    html += '<div class="add-circle">＋</div>'+cat.name+'を追加';
    html += '</div></div>';
  });
  // Uncategorized
  var none = catMap['none'] || [];
  if (none.length > 0) {
    html += '<div class="cat-section">';
    none.forEach(function(item) { html += renderItemCard(item); });
    html += '</div>';
  }
  return html;
}

function renderItemCard(item) {
  var master = getItem(item.item_id);
  var name = (master && master.name) || item.item_name || '商品';
  var qty = item.qty || 1;
  var unit = item.unit || (master && master.stock_unit) || '個';
  // Price comparison
  var hist = item.item_id ? S.priceHistory.filter(function(h){return h.item_id===item.item_id;}) : [];
  var minPrice = hist.length ? Math.min.apply(null, hist.map(function(h){return h.price;})) : 0;
  var lastPrice = item.item_id ? getLastPrice(item.item_id, item.store_id) : 0;
  var price = item.actual_price || item.flyer_price || lastPrice || 0;
  var isW = isWeightUnit(unit);
  var total = isW ? (price * qty / extractUnitG(unit)) : (price * qty);
  var priceLabel = item.actual_price ? '購入済' : (item.flyer_price ? '予定' : (lastPrice ? '参考' : ''));
  if (isW && total) priceLabel = qty + 'g分';
  else if (!isW && qty > 1 && total) priceLabel = qty + '点合計';
  // Build badges
  var badges = '';
  if (item.flyer_price) badges += '<span class="badge badge-orange">チラシ ¥'+item.flyer_price+'</span>';
  if (lastPrice && !item.flyer_price) badges += '<span class="badge badge-gray">前回 ¥'+lastPrice+'</span>';
  // Price comparison from history
  var storeHist = {};
  hist.slice(0,5).forEach(function(h) {
    if (!storeHist[h.store_id]) storeHist[h.store_id] = h.price;
  });
  Object.keys(storeHist).forEach(function(sid) {
    var st = getStore(sid);
    var p = storeHist[sid];
    var isBest = p === minPrice && minPrice > 0;
    if (st) badges += '<span class="badge '+(isBest?'badge-best':'badge-gray')+'">'+st.name.split(' ')[0]+' ¥'+p+(isBest?' ★最安':'')+'</span>';
  });
  var store = getStore(item.store_id);
  var borderColor = store ? store.color : '#52B788';
  var checked = item.is_checked;
  return '<div class="item-card'+(checked?' checked':'')+'" style="border-left-color:'+borderColor+'">' +
    '<div class="item-main">' +
    '<div class="item-check'+(checked?' done':'')+'" onclick="toggleCheck(\''+item.id+'\')"></div>' +
    '<div class="item-body" onclick="openAction(\''+item.id+'\')">' +
    '<div class="item-name">'+name+'</div>' +
    '<div class="item-sub" style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">' +
    (isW
      ? '<span style="color:var(--muted)">'+unit+'単価</span>' +
        '<button class="qty-btn" onclick="event.stopPropagation();changeQty(\''+item.id+'\',-'+extractUnitG(unit)+')" style="width:20px;height:20px;font-size:14px;">−</button>' +
        '<span style="font-size:13px;font-weight:700">'+qty+'g</span>' +
        '<button class="qty-btn" onclick="event.stopPropagation();changeQty(\''+item.id+'\','+extractUnitG(unit)+')" style="width:20px;height:20px;font-size:14px;">＋</button>'
      : '<span style="color:var(--muted)">'+(unit||'個')+(qty>1?' × '+qty:'')+'</span>' +
        '<button class="qty-btn" onclick="event.stopPropagation();changeQty(\''+item.id+'\',-1)" style="width:20px;height:20px;font-size:14px;">−</button>' +
        '<span style="font-size:13px;font-weight:700">'+qty+'</span>' +
        '<button class="qty-btn" onclick="event.stopPropagation();changeQty(\''+item.id+'\',1)" style="width:20px;height:20px;font-size:14px;">＋</button>') +
    '</div>' +
    (badges ? '<div class="item-badges">'+badges+'</div>' : '') +
    '</div>' +
    '<div class="item-price-col">' +
    (total ? '<div class="item-price">'+fmt(total)+'</div>' : '') +
    (priceLabel ? '<div class="item-price-label">'+priceLabel+'</div>' : '') +
    '</div></div></div>';
}

function getLastPrice(itemId, storeId) {
  var hist = S.priceHistory.filter(function(h){return h.item_id===itemId && h.store_id===storeId;});
  return hist.length ? hist[0].price : 0;
}

// ═══════════════════════════════════════
// SHOPPING CRUD
// ═══════════════════════════════════════
var _selectedMaster = null;

// ── Weight helpers ──
function isWeightUnit(u) { return /^\d+(?:\.\d+)?\s*g$/i.test((u||'').trim()); }
function extractUnitG(u) { var m=(u||'').match(/(\d+(?:\.\d+)?)/); return m ? parseFloat(m[1]) : 100; }
function calcItemPrice(item) {
  var price = item.actual_price || item.flyer_price || 0;
  var qty = item.qty || 1;
  if (isWeightUnit(item.unit)) { return price * qty / extractUnitG(item.unit); }
  return price * qty;
}

function onUnitInput() {
  var u = document.getElementById('item-unit').value;
  var isW = isWeightUnit(u);
  document.getElementById('weight-mode-row').style.display = isW ? '' : 'none';
  document.getElementById('count-mode-row').style.display = isW ? 'none' : '';
  updateTotalPreview();
}

function stepQty(delta) {
  var el = document.getElementById('item-qty');
  el.value = Math.max(1, (parseInt(el.value)||1) + delta);
  updateTotalPreview();
}

function updateTotalPreview() {
  var u = (document.getElementById('item-unit')||{}).value || '';
  var flyer = parseFloat((document.getElementById('item-flyer')||{}).value)||0;
  var el = document.getElementById('item-total-preview');
  if (!el) return;
  if (!flyer) { el.textContent = ''; return; }
  if (isWeightUnit(u)) {
    var g = parseFloat((document.getElementById('item-actual-g')||{}).value)||0;
    if (!g) { el.textContent = ''; return; }
    var unitG = extractUnitG(u);
    var total = flyer * g / unitG;
    el.textContent = g + 'g ÷ ' + unitG + 'g × ¥' + flyer + ' = 合計 ¥' + Math.round(total).toLocaleString();
  } else {
    var qty = parseInt((document.getElementById('item-qty')||{}).value)||1;
    var t = flyer * qty;
    el.textContent = (qty > 1) ? '合計 ¥' + Math.round(t).toLocaleString() : '';
  }
}

function openAddItem(storeId, catId) {
  _selectedMaster = null;
  document.getElementById('item-store-id').value = storeId;
  document.getElementById('item-cat-id').value = catId;
  document.getElementById('item-name').value = '';
  document.getElementById('item-qty').value = '1';
  document.getElementById('item-unit').value = '';
  document.getElementById('item-flyer').value = '';
  document.getElementById('item-actual-g').value = '';
  document.getElementById('item-total-preview').textContent = '';
  document.getElementById('item-suggest').innerHTML = '';
  document.getElementById('weight-mode-row').style.display = 'none';
  document.getElementById('count-mode-row').style.display = '';
  openModal('item-modal');
}

function suggestItems(val) {
  var el = document.getElementById('item-suggest');
  if (!val) { el.innerHTML = ''; return; }
  var matches = S.items.filter(function(i){return i.name.includes(val);}).slice(0,5);
  el.innerHTML = matches.map(function(m) {
    return '<div class="suggest-item" onclick="pickSuggest(\''+m.id+'\')">'+m.name+'</div>';
  }).join('');
}

function pickSuggest(id) {
  var item = getItem(id);
  if (!item) return;
  _selectedMaster = item;
  document.getElementById('item-name').value = item.name;
  document.getElementById('item-unit').value = item.stock_unit || '個';
  document.getElementById('item-suggest').innerHTML = '';
  onUnitInput();
}

async function saveShoppingItem() {
  var name = document.getElementById('item-name').value.trim();
  if (!name) return;
  var storeId = document.getElementById('item-store-id').value;
  var catId = document.getElementById('item-cat-id').value;
  var unit = document.getElementById('item-unit').value.trim() || '個';
  var qty;
  if (isWeightUnit(unit)) {
    qty = parseFloat(document.getElementById('item-actual-g').value) || 1;
  } else {
    qty = parseFloat(document.getElementById('item-qty').value) || 1;
  }
  var flyer = parseFloat(document.getElementById('item-flyer').value) || null;
  var itemId = _selectedMaster ? _selectedMaster.id : null;
  if (!itemId) {
    var ex = S.items.find(function(i){return i.name===name;});
    if (ex) itemId = ex.id;
  }
  if (!itemId) {
    var ni = {name:name, category_id:catId||null, stock_unit:unit, input_count:1};
    if (db) {
      var r = await db.from('items').insert(ni).select().single();
      if (r.data) { itemId = r.data.id; S.items.push(r.data); }
    } else {
      ni.id = genId(); S.items.push(ni); itemId = ni.id;
    }
  }
  var entry = {
    item_id: itemId, item_name: name,
    store_id: (!storeId||storeId==='none') ? null : storeId,
    category_id: catId||null,
    qty:qty, unit:unit, flyer_price:flyer,
    is_checked:false, date:today()
  };
  if (db) {
    var res = await db.from('shopping_list').insert(entry).select().single();
    if (res.data) S.shoppingList.push(res.data);
  } else {
    entry.id = genId(); entry.created_at = new Date().toISOString();
    S.shoppingList.push(entry);
  }
  _selectedMaster = null;
  closeModal('item-modal');
  renderShopping(); updateBudget();
}

async function toggleCheck(id) {
  var item = S.shoppingList.find(function(i){return i.id===id;});
  if (!item) return;
  item.is_checked = !item.is_checked;
  if (item.is_checked) {
    var price = item.actual_price || item.flyer_price;
    if (price && item.item_id && item.store_id && db) {
      await db.from('price_history').insert({item_id:item.item_id,store_id:item.store_id,price:price,qty:item.qty,unit:item.unit,date:today()}).then(function(){});
      S.priceHistory.unshift({id:genId(),item_id:item.item_id,store_id:item.store_id,price:price,qty:item.qty,unit:item.unit,date:today()});
    }
    // Update inventory
    var master = getItem(item.item_id);
    if (master && master.current_stock !== undefined) {
      master.current_stock = (master.current_stock||0) + (item.qty||1);
      if (db) await db.from('items').update({current_stock:master.current_stock}).eq('id',master.id);
    }
  }
  if (db) await db.from('shopping_list').update({is_checked:item.is_checked}).eq('id',id);
  renderShopping(); updateBudget();
}

async function changeQty(id, delta) {
  var item = S.shoppingList.find(function(i){return i.id===id;});
  if (!item) return;
  var minVal = isWeightUnit(item.unit) ? extractUnitG(item.unit) : 1;
  item.qty = Math.max(minVal, (item.qty||1)+delta);
  if (db) await db.from('shopping_list').update({qty:item.qty}).eq('id',id);
  renderShopping(); updateBudget();
}

function openAction(id) {
  var item = S.shoppingList.find(function(i){return i.id===id;});
  if (!item) return;
  var master = getItem(item.item_id);
  document.getElementById('action-title').textContent = (master&&master.name) || item.item_name || '商品';
  document.getElementById('action-id').value = id;
  document.getElementById('action-flyer').value = item.flyer_price || '';
  document.getElementById('action-actual').value = item.actual_price || '';
  openModal('action-modal');
}

async function saveAction() {
  var id = document.getElementById('action-id').value;
  var item = S.shoppingList.find(function(i){return i.id===id;});
  if (!item) return;
  item.flyer_price = parseFloat(document.getElementById('action-flyer').value)||null;
  item.actual_price = parseFloat(document.getElementById('action-actual').value)||null;
  if (db) await db.from('shopping_list').update({flyer_price:item.flyer_price,actual_price:item.actual_price}).eq('id',id);
  closeModal('action-modal');
  renderShopping(); updateBudget();
}

async function deleteItem() {
  var id = document.getElementById('action-id').value;
  if (!confirm('削除しますか？')) return;
  S.shoppingList = S.shoppingList.filter(function(i){return i.id!==id;});
  if (db) await db.from('shopping_list').delete().eq('id',id);
  closeModal('action-modal');
  renderShopping(); updateBudget();
}

async function clearChecked() {
  var ids = S.shoppingList.filter(function(i){return i.is_checked;}).map(function(i){return i.id;});
  S.shoppingList = S.shoppingList.filter(function(i){return !i.is_checked;});
  if (db && ids.length) await db.from('shopping_list').delete().in('id',ids);
  renderShopping(); updateBudget();
}

// ═══════════════════════════════════════
// STORE MODAL
// ═══════════════════════════════════════
function openAddStoreModal() {
  document.getElementById('store-modal-title').textContent = '店舗を追加';
  document.getElementById('store-edit-id').value = '';
  document.getElementById('store-name').value = '';
  document.getElementById('store-budget').value = '';
  initColorSwatches('');
  openModal('store-modal');
}

function initColorSwatches(selected) {
  document.getElementById('color-swatches').innerHTML = COLORS.map(function(c) {
    return '<div class="color-swatch'+(c===selected?' selected':'')+'" style="background:'+c+'" data-color="'+c+'" onclick="selectColor(this)"></div>';
  }).join('');
  if (!selected) document.querySelector('.color-swatch').classList.add('selected');
}

function selectColor(el) {
  document.querySelectorAll('.color-swatch').forEach(function(s){s.classList.remove('selected');});
  el.classList.add('selected');
}

async function saveStore() {
  var id = document.getElementById('store-edit-id').value;
  var name = document.getElementById('store-name').value.trim();
  if (!name) return;
  var color = (document.querySelector('.color-swatch.selected')||{dataset:{color:COLORS[0]}}).dataset.color;
  var amount = parseFloat(document.getElementById('store-budget').value)||0;
  if (id) {
    var store = getStore(id);
    if (store) { store.name=name; store.color=color; }
    if (db) await db.from('stores').update({name:name,color:color}).eq('id',id);
  } else {
    var ns = {name:name,color:color,use_count:0,is_master:true};
    if (db) {
      var r = await db.from('stores').insert(ns).select().single();
      if (r.data) { S.stores.push(r.data); id=r.data.id; }
    } else {
      ns.id = genId(); S.stores.push(ns); id=ns.id;
    }
  }
  if (amount && id) {
    var bud = S.budgets.find(function(b){return b.store_id===id;});
    if (bud) {
      bud.amount=amount;
      if (db) await db.from('budget').update({amount:amount}).eq('id',bud.id);
    } else {
      var nb = {store_id:id,amount:amount,month:thisMonth()};
      if (db) {
        var br = await db.from('budget').insert(nb).select().single();
        if (br.data) S.budgets.push(br.data);
      } else { nb.id=genId(); S.budgets.push(nb); }
    }
  }
  closeModal('store-modal');
  renderAll();
}

// ═══════════════════════════════════════
// CATEGORY MODAL
// ═══════════════════════════════════════
function openCatModal(id) {
  var cat = id ? getCat(id) : null;
  document.getElementById('cat-modal-title').textContent = id ? 'カテゴリを編集' : 'カテゴリを追加';
  document.getElementById('cat-edit-id').value = id||'';
  document.getElementById('cat-name').value = cat ? cat.name : '';
  document.getElementById('cat-stock-toggle').className = 'toggle' + (cat&&cat.stock_enabled?' on':'');
  document.getElementById('emoji-picker').innerHTML = EMOJIS.map(function(e) {
    return '<button class="emoji-opt'+(cat&&cat.icon===e?' selected':'')+'" onclick="selectEmoji(this)">'+e+'</button>';
  }).join('');
  openModal('cat-modal');
}

function selectEmoji(el) {
  document.querySelectorAll('.emoji-opt').forEach(function(e){e.classList.remove('selected');});
  el.classList.add('selected');
}

async function saveCategory() {
  var id = document.getElementById('cat-edit-id').value;
  var name = document.getElementById('cat-name').value.trim();
  if (!name) return;
  var icon = (document.querySelector('.emoji-opt.selected')||{textContent:'📦'}).textContent;
  var stock = document.getElementById('cat-stock-toggle').classList.contains('on');
  if (id) {
    var cat = getCat(id);
    if (cat) { cat.name=name; cat.icon=icon; cat.stock_enabled=stock; }
    if (db) await db.from('categories').update({name:name,icon:icon,stock_enabled:stock}).eq('id',id);
  } else {
    var max = Math.max.apply(null,[0].concat(S.categories.map(function(c){return c.sort_order||0;})));
    var nc = {name:name,icon:icon,stock_enabled:stock,sort_order:max+1};
    if (db) {
      var r = await db.from('categories').insert(nc).select().single();
      if (r.data) S.categories.push(r.data);
    } else { nc.id=genId(); S.categories.push(nc); }
  }
  closeModal('cat-modal');
  renderManage();
}

async function deleteCat(id) {
  if (!confirm('削除しますか？')) return;
  S.categories = S.categories.filter(function(c){return c.id!==id;});
  if (db) await db.from('categories').delete().eq('id',id);
  renderManage();
}

// ═══════════════════════════════════════
// MANAGE SCREEN
// ═══════════════════════════════════════
function renderManage() {
  var t = S.manageTab;
  if (t==='categories') renderCatTab();
  if (t==='inventory') renderInvTab();
  if (t==='stores') renderStoresMgmtTab();
}

function renderCatTab() {
  var el = document.getElementById('manage-categories');
  var html = '';
  S.categories.slice().sort(function(a,b){return (a.sort_order||0)-(b.sort_order||0);}).forEach(function(cat) {
    html += '<div class="section-card"><div class="row-item">';
    html += '<span style="font-size:22px">'+cat.icon+'</span>';
    html += '<div style="flex:1"><div style="font-weight:600">'+cat.name+'</div>';
    html += '<div style="font-size:11px;color:var(--muted)">'+(cat.stock_enabled?'在庫管理あり':'')+'</div></div>';
    html += '<div class="toggle'+(cat.stock_enabled?' on':'')+'" onclick="toggleCatStock(\''+cat.id+'\',this)"></div>';
    html += '<button class="btn-icon" onclick="openCatModal(\''+cat.id+'\')">✏️</button>';
    html += '<button class="btn-icon" onclick="deleteCat(\''+cat.id+'\')">🗑️</button>';
    html += '</div></div>';
  });
  html += '<div style="margin-top:8px"><button class="btn-primary btn-sm" onclick="openCatModal(\'\')" style="width:100%">＋ カテゴリを追加</button></div>';
  el.innerHTML = html;
}

async function toggleCatStock(id, el) {
  el.classList.toggle('on');
  var on = el.classList.contains('on');
  var cat = getCat(id);
  if (cat) cat.stock_enabled = on;
  if (db) await db.from('categories').update({stock_enabled:on}).eq('id',id);
}

function renderInvTab() {
  var el = document.getElementById('manage-inventory');
  var stockCats = S.categories.filter(function(c){return c.stock_enabled;});
  if (!stockCats.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>カテゴリ設定で在庫管理をONにしてください</p></div>';
    return;
  }
  var lowItems = S.items.filter(function(i) {
    var cat = getCat(i.category_id);
    return cat&&cat.stock_enabled && (i.current_stock||0)<=(i.stock_threshold||0);
  });
  var html = '';
  if (lowItems.length) {
    html += '<div class="alert-banner"><div><strong style="color:var(--red)">在庫不足 '+lowItems.length+'品目</strong></div>';
    html += '<button class="btn-primary btn-sm" onclick="addAllLow()">まとめて追加</button></div>';
  }
  stockCats.forEach(function(cat) {
    var items = S.items.filter(function(i){return i.category_id===cat.id;});
    html += '<div class="section-card"><div class="card-header"><h3>'+cat.icon+' '+cat.name+'</h3></div>';
    items.forEach(function(item) {
      var low = (item.current_stock||0)<=(item.stock_threshold||0);
      var inList = S.shoppingList.some(function(s){return s.item_id===item.id&&!s.is_checked;});
      html += '<div class="row-item" style="'+(low?'background:#FFF5F5':'')+'"><div style="flex:1">';
      html += '<div style="font-weight:500">'+item.name+(low?' <span class="badge badge-orange">不足</span>':'')+(inList?' <span class="badge badge-green">追加済</span>':'')+'</div>';
      html += '<div style="font-size:11px;color:var(--muted)">閾値:'+( item.stock_threshold||0)+(item.stock_unit||'個')+'</div></div>';
      html += '<div class="stepper"><button class="step-btn" onclick="updateStock(\''+item.id+'\',-1)">−</button>';
      html += '<span class="step-val">'+(item.current_stock||0)+'</span><span style="font-size:11px">'+( item.stock_unit||'個')+'</span>';
      html += '<button class="step-btn" onclick="updateStock(\''+item.id+'\',1)">＋</button></div></div>';
    });
    html += '<div class="add-item-row" style="padding:8px 14px" onclick="openInvModal(\''+cat.id+'\',\'\')"><div class="add-circle">＋</div>品目を追加</div>';
    html += '</div>';
  });
  el.innerHTML = html;
}

async function updateStock(id, delta) {
  var item = getItem(id);
  if (!item) return;
  item.current_stock = Math.max(0,(item.current_stock||0)+delta);
  if (db) await db.from('items').update({current_stock:item.current_stock}).eq('id',id);
  renderInvTab();
  if (item.current_stock<=(item.stock_threshold||0)) {
    var inList = S.shoppingList.some(function(s){return s.item_id===id&&!s.is_checked;});
    if (!inList) await addItemToList(item);
  }
}

async function addItemToList(item) {
  var e = {item_id:item.id,item_name:item.name,category_id:item.category_id,qty:1,unit:item.stock_unit||'個',is_checked:false,date:today()};
  if (db) {
    var r = await db.from('shopping_list').insert(e).select().single();
    if (r.data) S.shoppingList.push(r.data);
  } else { e.id=genId(); S.shoppingList.push(e); }
}

async function addAllLow() {
  var lows = S.items.filter(function(i) {
    var cat=getCat(i.category_id);
    var inList=S.shoppingList.some(function(s){return s.item_id===i.id&&!s.is_checked;});
    return cat&&cat.stock_enabled&&(i.current_stock||0)<=(i.stock_threshold||0)&&!inList;
  });
  for (var i=0;i<lows.length;i++) await addItemToList(lows[i]);
  renderInvTab();
}

function openInvModal(catId, itemId) {
  var item = itemId ? getItem(itemId) : null;
  document.getElementById('inv-cat-id').value = catId;
  document.getElementById('inv-item-id').value = itemId||'';
  document.getElementById('inv-name').value = item?item.name:'';
  document.getElementById('inv-unit').value = item?item.stock_unit||'':'個';
  document.getElementById('inv-stock').value = item?item.current_stock||0:0;
  document.getElementById('inv-threshold').value = item?item.stock_threshold||1:1;
  openModal('inv-modal');
}

async function saveInvItem() {
  var catId=document.getElementById('inv-cat-id').value;
  var editId=document.getElementById('inv-item-id').value;
  var name=document.getElementById('inv-name').value.trim();
  if (!name) return;
  var unit=document.getElementById('inv-unit').value||'個';
  var stock=parseFloat(document.getElementById('inv-stock').value)||0;
  var thr=parseFloat(document.getElementById('inv-threshold').value)||1;
  if (editId) {
    var item=getItem(editId);
    if (item){item.name=name;item.stock_unit=unit;item.current_stock=stock;item.stock_threshold=thr;}
    if (db) await db.from('items').update({name:name,stock_unit:unit,current_stock:stock,stock_threshold:thr}).eq('id',editId);
  } else {
    var ex=S.items.find(function(i){return i.name===name;});
    if (ex) {
      ex.category_id=catId;ex.stock_unit=unit;ex.current_stock=stock;ex.stock_threshold=thr;
      if (db) await db.from('items').update({category_id:catId,stock_unit:unit,current_stock:stock,stock_threshold:thr}).eq('id',ex.id);
    } else {
      var ni={name:name,category_id:catId,stock_unit:unit,current_stock:stock,stock_threshold:thr,is_master:true};
      if (db){var r=await db.from('items').insert(ni).select().single();if(r.data)S.items.push(r.data);}
      else{ni.id=genId();S.items.push(ni);}
    }
  }
  closeModal('inv-modal');
  renderInvTab();
}

function renderStoresMgmtTab() {
  var el = document.getElementById('manage-stores');
  var html = '';
  S.stores.forEach(function(store) {
    var bud = S.budgets.find(function(b){return b.store_id===store.id;});
    html += '<div class="section-card"><div class="row-item">';
    html += '<div style="width:14px;height:14px;border-radius:50%;background:'+store.color+';flex-shrink:0"></div>';
    html += '<div style="flex:1"><div style="font-weight:600">'+store.name+'</div>';
    html += '<div style="font-size:11px;color:var(--muted)">'+( bud?'予算 ¥'+bud.amount.toLocaleString():'予算未設定')+'</div></div>';
    html += '<span class="badge '+(store.is_master?'badge-green':'badge-gray')+'">'+( store.is_master?'登録済':'自動待ち')+'</span>';
    html += '<button class="btn-icon" onclick="editStore(\''+store.id+'\')">✏️</button>';
    html += '</div></div>';
  });
  html += '<div style="margin-top:8px"><button class="btn-primary btn-sm" onclick="openAddStoreModal()" style="width:100%">＋ 店舗を追加</button></div>';
  el.innerHTML = html;
}

// ═══════════════════════════════════════
// STORES SCREEN (4th tab)
// ═══════════════════════════════════════
function renderStoresScreen() {
  renderStoresMgmtTab();
  document.getElementById('stores-content').innerHTML = document.getElementById('manage-stores').innerHTML;
}

function editStore(id) {
  var store = getStore(id);
  if (!store) return;
  document.getElementById('store-modal-title').textContent = '店舗を編集';
  document.getElementById('store-edit-id').value = id;
  document.getElementById('store-name').value = store.name;
  var bud = S.budgets.find(function(b){return b.store_id===id;});
  document.getElementById('store-budget').value = bud?bud.amount:'';
  initColorSwatches(store.color);
  openModal('store-modal');
}

// ═══════════════════════════════════════
// PRICE HISTORY
// ═══════════════════════════════════════
function renderPricesTab(search) {
  var val = search !== undefined ? search : (document.getElementById('price-search-input')||{value:''}).value;
  var el = document.getElementById('prices-content');
  var matchItems = val
    ? S.items.filter(function(i){return i.name.includes(val);})
    : S.items.filter(function(i){return S.priceHistory.some(function(h){return h.item_id===i.id;});});
  if (!matchItems.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>価格履歴がありません</p></div>';
    return;
  }
  var html = '';
  matchItems.forEach(function(item) {
    var hist = S.priceHistory.filter(function(h){return h.item_id===item.id;}).slice(0,8);
    if (!hist.length) return;
    var minP = Math.min.apply(null, hist.map(function(h){return h.price;}));
    html += '<div class="section-card">';
    html += '<div class="card-header"><h3>'+item.name+'</h3><span style="font-size:12px;color:var(--muted)">最安 ¥'+minP+'</span></div>';
    hist.forEach(function(h) {
      var st = getStore(h.store_id);
      var best = h.price===minP;
      html += '<div class="hist-row'+(best?' best':'')+'"><div><div style="font-weight:'+(best?700:400)+'">'+((st&&st.name)||'不明')+(best?' ★':'')+' </div><div style="font-size:11px;color:var(--muted)">'+h.date+'</div></div>';
      html += '<div class="hist-price">¥'+h.price+' <span style="font-size:11px;font-weight:400;color:var(--muted)">×'+(h.qty||1)+(h.unit||'')+'</span></div></div>';
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

document.getElementById('add-store-btn').addEventListener('click', openAddStoreModal);
